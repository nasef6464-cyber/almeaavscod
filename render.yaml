services:
  - type: web
    name: almeaa-platform-server
    env: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev
    startCommand: npx tsx scripts/applyPgMigration.mjs && npx tsx src/server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: USE_POSTGRES
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_OAUTH_ENABLED
        value: "true"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: NOTIFICATION_QUEUE_ENABLED
        value: "false"
      - key: EMAIL_PROVIDER
        value: console
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
