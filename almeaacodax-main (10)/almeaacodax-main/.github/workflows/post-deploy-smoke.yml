name: Post Deploy Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SMOKE_ADMIN_TOKEN: ${{ secrets.SMOKE_ADMIN_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Frontend strict smoke
        run: npm run smoke:frontend:strict

      - name: Production hardening smoke
        run: npm run smoke:production-hardening

      - name: Ensure operational token exists
        run: |
          if [ -z "$SMOKE_ADMIN_TOKEN" ]; then
            echo "SMOKE_ADMIN_TOKEN GitHub secret is missing."
            echo "Add it in: Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Operational smoke
        run: npm run smoke:operational
